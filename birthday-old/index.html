<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Story Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Birthday Story Game</h1>
  <div id="submit-section">
    <textarea id="story-input" rows="4" placeholder="Enter a funny true story (anonymous)"></textarea>
    <button id="submit-btn">Submit Story</button>
  </div>
  <div id="display-section" style="display:none;">
    <p id="story-text"></p>
    <button id="next-btn">Next Story</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
